# =============================================================================
#  Application configuration. Spring Boot reads these key=value pairs at startup.
#  Two database options are provided below - enable exactly ONE of them.
# =============================================================================

# -----------------------------------------------------------------------------
#  OPTION A: MariaDB  (run `docker compose up -d` first - see README-MARIA-DB.md)
#  The app runs on your host, so it reaches the container via localhost:3306.
#  Use the MariaDB driver here; the MySQL driver can't read MariaDB metadata.
#  (For a real MySQL server instead, use:
#     jdbc:mysql://localhost:3306/ex4  +  driver com.mysql.cj.jdbc.Driver)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:mariadb://localhost:3306/ex4
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# create = drop & recreate the schema on every startup (fine for a teaching demo).
spring.jpa.hibernate.ddl-auto=create
# NOTE: with Hibernate 6 the dialect is auto-detected, so we no longer set
# spring.jpa.database-platform manually (the old MySQL57Dialect was removed).

# -----------------------------------------------------------------------------
#  OPTION B: H2 in-memory database  (zero setup, data lost on restart)
#  To use it: comment out OPTION A above and uncomment the four lines below.
# -----------------------------------------------------------------------------
#spring.datasource.url=jdbc:h2:mem:ex4
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=password

# Print the SQL Hibernate generates - useful for seeing transactions in action.
spring.jpa.show-sql=true

# H2 web console at http://localhost:8080/h2-console (only relevant for OPTION B).
spring.h2.console.enabled=true

# Example of a custom property; inject with @Value("${demo.coursename}") if needed.
demo.coursename=Internet